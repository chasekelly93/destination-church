<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Make Your Pledge</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f8fafc;
    color: #0f172a;
    margin: 0;
    padding: 2rem 1rem;
  }
  main {
    max-width: 480px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.25rem;
  }
  p.subtitle {
    color: #475569;
    margin-top: 0;
  }
  label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    margin-top: 1rem;
  }
  input {
    width: 100%;
    box-sizing: border-box;
    margin-top: 0.25rem;
    padding: 0.6rem 0.75rem;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    font-size: 1rem;
  }
  button {
    width: 100%;
    margin-top: 1.5rem;
    padding: 0.7rem;
    background: #0f172a;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  #message {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 6px;
    font-size: 0.9rem;
  }
  #message.error {
    background: #fef2f2;
    color: #b91c1c;
  }
  #message.duplicate {
    background: #fffbeb;
    color: #92400e;
  }
  #message.success {
    background: #f0fdf4;
    color: #166534;
  }
  #result-view h1 {
    text-align: center;
  }
  #result-view p {
    text-align: center;
    color: #475569;
  }
  [hidden] {
    display: none !important;
  }
</style>
</head>
<body>
  <main>
    <div id="form-view">
      <h1>Make Your Pledge</h1>
      <p class="subtitle">
        Join the campaign by committing your pledge below. This is a
        one-time commitment.
      </p>

      <form id="pledge-form">
        <label for="full_name">Full name</label>
        <input id="full_name" name="full_name" type="text" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="phone">Phone number</label>
        <input id="phone" name="phone" type="tel" required />

        <label for="address">Address (optional)</label>
        <input id="address" name="address" type="text" />

        <label for="amount">Pledge amount ($)</label>
        <input id="amount" name="amount" type="number" min="1" step="0.01" required />

        <button id="submit-btn" type="submit">Submit Pledge</button>
        <div id="message" hidden></div>
      </form>
    </div>

    <div id="result-view" hidden>
      <h1 id="result-title"></h1>
      <p id="result-body"></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // Fill in from Supabase Project Settings > API. The anon key is safe to
    // expose publicly — it only grants what Row Level Security allows.
    var SUPABASE_URL = "https://ptxloxbolbnwfnwurnpi.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0eGxveGJvbGJud2Zud3VybnBpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwNjg5NjEsImV4cCI6MjA4NTY0NDk2MX0.Yg3n5ojdAG2MmYtgfXnacQRU2-iVpI1CgClG7U5DAv8";

    var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var formView = document.getElementById("form-view");
    var resultView = document.getElementById("result-view");
    var resultTitle = document.getElementById("result-title");
    var resultBody = document.getElementById("result-body");
    var messageEl = document.getElementById("message");
    var submitBtn = document.getElementById("submit-btn");
    var form = document.getElementById("pledge-form");

    function showResult(title, body) {
      formView.hidden = true;
      resultView.hidden = false;
      resultTitle.textContent = title;
      resultBody.textContent = body;
    }

    function showMessage(text, className) {
      messageEl.hidden = false;
      messageEl.textContent = text;
      messageEl.className = className;
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting…";
      messageEl.hidden = true;

      var formData = new FormData(form);
      var address = String(formData.get("address") || "").trim();

      var payload = {
        full_name: String(formData.get("full_name") || "").trim(),
        email: String(formData.get("email") || "").trim().toLowerCase(),
        phone: String(formData.get("phone") || "").trim(),
        address: address.length > 0 ? address : null,
        amount: Number(formData.get("amount")),
      };

      var result = await supabaseClient.from("pledges").insert(payload);

      if (!result.error) {
        showResult(
          "Thank you for your pledge!",
          "We've recorded your commitment to the campaign. You'll hear from us soon."
        );
        return;
      }

      if (result.error.code === "23505") {
        showResult(
          "You've already pledged",
          "It looks like this email has already submitted a pledge. Pledges are one-time — reach out to us directly if you need to make a change."
        );
        return;
      }

      submitBtn.disabled = false;
      submitBtn.textContent = "Submit Pledge";
      showMessage(result.error.message, "error");
    });
  </script>
</body>
</html>
